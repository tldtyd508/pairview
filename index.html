<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="함께한 경험, 서로 다른 리뷰. Pairview가 곧 시작됩니다."
    />
    <meta property="og:title" content="Pairview" />
    <meta
      property="og:description"
      content="함께한 경험, 서로 다른 리뷰."
    />
    <meta property="og:type" content="website" />
    <title>Pairview — 함께한 경험, 서로 다른 리뷰</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #f7f6f2;
        color: #191918;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(680px, calc(100% - 48px));
      }

      .eyebrow {
        margin: 0 0 20px;
        color: #77746d;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(64px, 14vw, 116px);
        font-weight: 650;
        letter-spacing: -0.075em;
        line-height: 0.9;
      }

      p {
        margin: 32px 0 0;
        color: #55524c;
        font-size: clamp(18px, 3vw, 24px);
        letter-spacing: -0.025em;
        line-height: 1.5;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        margin-top: 48px;
        color: #77746d;
        font-size: 13px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #ef6a4c;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Coming soon</div>
      <h1>Pairview</h1>
      <p>함께한 경험,<br />서로 다른 리뷰.</p>
      <div class="status"><span class="dot"></span>취향을 기록하는 중</div>
    </main>
  </body>
</html>
